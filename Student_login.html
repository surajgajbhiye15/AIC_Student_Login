<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAKRUTI 2026 | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'sw-red': '#E82127' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* 🚀 THE ULTIMATE NO-SCROLL SCALING ENGINE 🚀 */
        html {
            font-size: clamp(10px, min(1.3vw, 1.8vh), 18px); 
        }

        @media (max-width: 768px) {
            html {
                font-size: clamp(12px, min(3.5vw, 2.5vh), 16px);
            }
        }

        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="h-[100dvh] w-full overflow-hidden flex flex-col relative antialiased">

    <div class="fixed inset-0 z-[-2] bg-[url('https://github.com/surajgajbhiye15/AIC_Student_Login/blob/main/YT+Thumbnail2.png?raw=true')] bg-cover bg-center"></div>
    <div class="fixed inset-0 z-[-1] bg-white/50"></div>

    <header class="w-full pt-6 px-8 flex justify-center shrink-0">
        <img src="https://github.com/surajgajbhiye15/index/blob/main/Aakruti%20Logo.png?raw=true" alt="AAKRUTI Logo" class="h-14 drop-shadow-sm">
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 w-full">
        
        <div class="text-center mb-8 w-full px-4 shrink-0">
            <h1 class="text-[2.6rem] font-black text-sw-red leading-none uppercase tracking-tighter whitespace-nowrap">
                AAKRUTI Innovation Competition 2026
            </h1>
            <p class="text-gray-700 text-[0.8rem] font-bold uppercase tracking-[0.3em] mt-3">
                Students Dashboard
            </p>
        </div>

        <div class="w-full max-w-[28rem] bg-white/90 backdrop-blur-xl shadow-2xl border border-white rounded-[2rem] p-8 shrink-0">
            <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center">Sign In</h2>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-[0.8rem] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Team ID</label>
                    <input type="text" name="teamID" id="teamID" required 
                        class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-[#E82127] outline-none transition-all shadow-sm text-base font-bold text-gray-800"
                        placeholder="e.g. AIC2026-XXXX">
                </div>

                <div>
                    <label class="block text-[0.8rem] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Team Leader's Email</label>
                    <input type="email" name="leaderEmail" id="leaderEmail" required 
                        class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-[#E82127] outline-none transition-all shadow-sm text-base font-bold text-gray-800"
                        placeholder="leader@university.com">
                </div>

                <div>
                    <label class="block text-[0.8rem] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Student's or Mentor's Email</label>
                    <input type="email" id="studentEmail" name="studentEmail" required 
                        class="w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-[#E82127] outline-none transition-all shadow-sm text-base font-bold text-gray-800"
                        placeholder="you@university.com">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full flex items-center justify-center bg-sw-red text-white font-black h-14 rounded-xl shadow-lg hover:shadow-xl hover:bg-red-700 active:scale-[0.98] transition-all text-sm uppercase tracking-widest mt-4">
                    Access Dashboard
                </button>
            </form>
        </div>
    </main>
	
	<div id="errorModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity duration-300 opacity-0">
        <div id="errorModalContent" class="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full p-8 text-center transform transition-all duration-300 scale-95 opacity-0 border border-gray-100 relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 to-sw-red"></div>

            <div class="flex justify-center mb-6 mt-2">
                <img src="https://github.com/surajgajbhiye15/index/blob/main/Aakruti%20Logo.png?raw=true" alt="AAKRUTI Logo" class="h-10 object-contain drop-shadow-sm">
            </div>

            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_15px_rgba(244,63,94,0.2)]">
                <i class="fa-solid fa-triangle-exclamation text-3xl text-sw-red"></i>
            </div>

            <h3 class="text-xl font-black text-gray-800 mb-2 uppercase tracking-tight">Access Denied</h3>
            <p class="text-sm text-gray-500 font-medium mb-8 leading-relaxed">
                Invalid credentials. Please check your details and try accessing the dashboard again.
            </p>

            <button onclick="closeErrorPopup()" type="button" class="w-full bg-gradient-to-r from-sw-red to-red-700 hover:from-red-600 hover:to-red-800 text-white font-black py-4 px-4 rounded-2xl transition-all duration-300 shadow-md hover:shadow-lg active:scale-95 uppercase tracking-widest text-xs">
                Acknowledge
            </button>
        </div>
    </div>

    <footer class="w-full py-4 flex items-center justify-center text-gray-500 text-[0.65rem] font-bold uppercase tracking-widest text-center px-4 shrink-0">
        © 2026 AAKRUTI Innovation Competition | Dassault Systèmes
    </footer>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwMX-YNDZjIGTJKqkaDlNhKneAONgaZjOVSHbqsEQ7_JJJZniuLtmgGCI1RwYB_exc5/exec';
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn'); // <-- Defined as 'btn'

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // 1. CAPTURE THE ORIGINAL TEXT (Fixes Bug 1)
        const originalBtnText = btn.innerHTML; 

        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Verifying Credentials...`;

        const loginData = new FormData(form);
        loginData.append('action', 'login');
        loginData.append('passkey', 'Aakruti_Secure_2026_x99!');

        fetch(scriptURL, { method: 'POST', body: loginData })
        .then(response => response.json())
        .then(data => {
            if (data.status === "Found") {
                data.progressStep = data.progressStep ? parseInt(data.progressStep) : 2;

                if (data.mentorFirstName) {
                    data.mentor = {
                        firstName: data.mentorFirstName,
                        lastName: data.mentorLastName,
                        email: data.mentorEmail,
                        org: data.mentorOrg,
                        country: data.mentorCountry
                    };
                }

                localStorage.setItem('teamProfile', JSON.stringify(data));
                window.location.href = 'Dashboard.html';
            } else {
                // Login failed! Reset the button and SHOW POPUP
                btn.innerHTML = originalBtnText; // <-- Use 'btn' instead of 'submitBtn' (Fixes Bug 2)
                btn.disabled = false;
                
                showErrorPopup(); 
            }
        })
        .catch(error => {
            console.error('Error!', error.message);
            btn.innerHTML = originalBtnText; // <-- Use 'btn' here too
            btn.disabled = false;
            
            showErrorPopup(); 
        });
    });
	
    // Functions to handle the Error Popup
    function showErrorPopup() {
        const modal = document.getElementById('errorModal');
        const content = document.getElementById('errorModalContent');
        
        // Unhide the background
        modal.classList.remove('hidden');
        
        // Trigger the smooth fade-in and scale-up animation
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modal.classList.add('opacity-100');
            
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function closeErrorPopup() {
        const modal = document.getElementById('errorModal');
        const content = document.getElementById('errorModalContent');
        
        // Trigger the fade-out and scale-down animation
        modal.classList.remove('opacity-100');
        modal.classList.add('opacity-0');
        
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        
        // Hide the background after the animation finishes (300ms)
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }
</script>
</body>
</html>
