        // ==========================================
        // 2. IMAGE PRE-LOADER (Bypasses strict security to read the images)
        // ==========================================
        async function getBase64ImageFromUrl(imageUrl) {
            return new Promise((resolve, reject) => {
                var img = new Image();
                img.crossOrigin = "Anonymous"; 
                img.onload = function () {
                    var canvas = document.createElement("canvas");
                    canvas.width = img.width;
                    canvas.height = img.height;
                    var ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0);
                    var dataURL = canvas.toDataURL("image/jpeg", 1.0);
                    resolve(dataURL);
                };
                img.onerror = reject;
                img.src = imageUrl;
            });
        }

        // ==========================================
        // 3. CORE PDF GENERATOR
        // ==========================================
        async function generateCertificates() {
            const statusText = document.getElementById('statusText');
            
            // Step A: Grab profile from local storage
            const profile = JSON.parse(localStorage.getItem('teamProfile'));
            if (!profile) {
                statusText.innerText = "Error: Team Profile not found.";
                statusText.classList.add('text-red-500');
                return;
            }

            try {
                // Step B: Download both templates
                statusText.innerText = "Downloading high-res templates...";
                const studentImgData = await getBase64ImageFromUrl(STUDENT_TEMPLATE_URL);
                const mentorImgData = await getBase64ImageFromUrl(MENTOR_TEMPLATE_URL);

                // Step C: Initialize jsPDF (A4 Paper, Landscape, Millimeters)
                statusText.innerText = "Stamping names & rendering PDF...";
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
                
                // Inject the Custom Font
                doc.addFileToVFS("3ds-Bold.ttf", font3dsBase64);
                doc.addFont("3ds-Bold.ttf", "3dsCustom", "bold");

                
                const pageWidth = 3508; 
                const pageHeight = 2480;

                // Collect all valid student members
                const members = [];
                if (profile.leaderName && profile.leaderName !== '---') members.push(profile.leaderName);
                if (profile.m1Name) members.push(profile.m1Name);
                if (profile.m2Name) members.push(profile.m2Name);
                if (profile.m3Name) members.push(profile.m3Name);

                let isFirstPage = true;

                // Step D: Loop through students and create pages
                for (const memberName of members) {
                    if (!isFirstPage) { doc.addPage(); }
                    
                    // 1. Paste the Student Background
                    doc.addImage(studentImgData, 'JPEG', 0, 0, pageWidth, pageHeight);
                    
                    // 2. Set the Font Style to your custom font
                    doc.setFont("3dsCustom", "bold");
                    doc.setFontSize(45); 
                    doc.setTextColor(30, 41, 59); // Dark Slate color (Adjust RGB if needed)
                    
                    // 3. Stamp the text dead-center horizontally, and 115mm down from the top
                    // NOTE: Change "115" to move the name up or down on your specific template!
                    doc.text(memberName.toUpperCase(), pageWidth / 2, 115, { align: "center" });
                    
                    isFirstPage = false;
                }

                // Step E: Create the Mentor Page (if registered)
                if (profile.mentor && profile.mentor.firstName) {
                    if (!isFirstPage) { doc.addPage(); }
                    
                    const mentorFullName = `${profile.mentor.firstName} ${profile.mentor.lastName}`;
                    
                    doc.addImage(mentorImgData, 'JPEG', 0, 0, pageWidth, pageHeight);
                    
                    doc.setFont("3dsCustom", "bold");
                    doc.setFontSize(45); 
                    doc.setTextColor(0, 85, 164); // Dassault Blue for Mentor
                    
                    doc.text(mentorFullName.toUpperCase(), pageWidth / 2, 115, { align: "center" });
                }

                // Step F: Save the file!
                statusText.innerText = "Saving file...";
                
                // Uses Team ID dynamically for the filename
                const safeTeamID = profile.teamID || "Unknown_Team";
                doc.save(`${safeTeamID}_Participation_Certificates.pdf`);

                // Step G: Show Success UI
                document.getElementById('loadingState').classList.add('hidden');
                const successDiv = document.getElementById('successState');
                successDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    successDiv.classList.remove('scale-95', 'opacity-0');
                }, 50);

            } catch (error) {
                console.error(error);
                statusText.innerText = "Network Error loading templates.";
                statusText.classList.add('text-sw-red', 'font-bold');
            }
        }

        // Auto-start generation slightly after the page loads for a smooth UI experience
        window.onload = () => {
            setTimeout(generateCertificates, 800); 
        };
    </script>
</body>
</html>
